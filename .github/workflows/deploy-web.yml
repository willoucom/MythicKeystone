name: Deploy web guides to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'MythicDungeonNotes/**'
      - 'web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      # `npm install --include=optional` rather than `npm ci` because sharp's
      # platform-specific binaries (@img/sharp-*) are recorded in the lockfile
      # only for the OS it was generated on. CI runs on Linux, dev is on Windows.
      - run: npm install --include=optional --no-audit --no-fund
        working-directory: web
      - run: npm run build
        working-directory: web
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
